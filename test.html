<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins';
}

body {
    background-color: #0d2b4d;
    color: white;
}

.contact{
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 60px 20px;
    min-height: 100vh;
}

.container {
    background-color: #0d2b4d;
    width: 100%;
    max-width: 900px;
    text-align: center;
}

.g {
    font-size: 14px;
    color: #cbd5e1;
    margin-bottom: 5px;
}

.cme{
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 40px;
    letter-spacing: 1px;
}

.form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.row {
    display: flex;
    gap: 20px;
}

.fg {
    flex: 1;
    text-align: left;
}

label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 5px;
    color: #ffffff;
}

input,
textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 5px;
    border: 1px solid #cbd5e1;
    background-color: transparent;
    color: #ffffff;
    font-size: 15px;
    outline: none;
}

textarea::placeholder {
    color: #cbd5e1;
    font-size: 14px;
}

input::placeholder {
    color: transparent;
}

input:focus,
textarea:focus {
    border-color: #ffffff;
}

.f{
    width: 100%;
}

.form-submit {
    margin-top: 10px;
}

button {
    background-color: white;
    color: #0d2b4d;
    border: none;
    padding: 12px 40px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 1px;
    transition: all 0.3s ease;
}

button:hover {
    background-color: #e5e7eb;
}

</style>
<body>
    <div class="contact">
        <div class="container">
            <p class="g">Get in touch</p>
            <h2 class="cme">CONTACT ME</h2>

            <div class="form">
                <div class="row">
                    <div class="fg">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" placeholder="">
                    </div>
                    <div class="fg">
                        <label for="lastName">Last Name</label>
                        <input type="text" placeholder="">
                    </div>
                </div>

                <div class="row">
                    <div class="fg">
                        <label for="email">Email</label>
                        <input type="email" placeholder="">
                    </div>
                    <div class="fg">
                        <label for="phone">Phone Number</label>
                        <input type="tel"  placeholder="">
                    </div>
                </div>

                <div class="fg f">
                    <label for="message">Message</label>
                    <textarea rows="5" placeholder="type your message..."></textarea>
                </div>

                <div class="form-submit">
                    <button type="submit">SUBMIT</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
